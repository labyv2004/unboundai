kind = "web"
previewPath = "/"
title = "Unbound AI"
version = "1.0.0"
id = "artifacts/unbound-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19526
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/unbound-ai run dev"

[services.env]
PORT = "19526"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/unbound-ai", "run", "build"]
publicDir = "artifacts/unbound-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
